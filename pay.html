<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Efetuado</title>

    <script>
        function redirecionar() {

            // Captura parâmetros da URL
            const params = new URLSearchParams(window.location.search);

            // Monta payload usando os parâmetros recebidos
            const payload = {
                status: "handle",
                handle: "sua_infinite_tag",
                order_nsu: params.get("order_nsu") || "",
                transaction_nsu: params.get("transaction_nsu") || "",
                slug: params.get("slug") || "",
                receipt_url: params.get("receipt_url") || "",
                capture_method: params.get("capture_method") || ""
            };

            console.log(payload);

            // Converte para JSON
            const jsonPayload = JSON.stringify(payload);

            // Deep Link
            const deepLink =
                "appsocio://retorno/tap_resulte?data=" +
                encodeURIComponent(jsonPayload);

            console.log(deepLink);

            // Redireciona
            window.location.href = deepLink;
        }

        // Aguarda 3 segundos
        setTimeout(redirecionar, 3000);
    </script>
</head>

<body>

    <h1>Pagamento Efetuado com Sucesso</h1>

    <p>
        Você será redirecionado automaticamente...
    </p>

</body>
</html>
