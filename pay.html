<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Efetuado</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }

        .ok {
            font-size: 64px;
            color: #28a745;
        }

        h1 {
            margin-top: 10px;
            color: #333;
        }

        p {
            color: #666;
        }

        .loader {
            margin-top: 20px;
            font-size: 14px;
            color: #999;
        }
    </style>

    <script>
        function redirecionar() {

            const payload = {
                status: "handle",
                handle: "sua_infinite_tag",
                order_nsu: "123456",
                transaction_nsu: "UUID-que-recebeu",
                slug: "codigo-da-fatura"
            };

            const url =
                'appsocio://retorno/tap_resulte?' +
                encodeURIComponent(JSON.stringify(payload));

            window.location.href = url;
        }

        setTimeout(redirecionar, 3000);
    </script>
</head>

<body>

    <div class="card">
        <div class="ok">✔</div>

        <h1>Pagamento Efetuado</h1>

        <p>
            Seu pagamento foi processado com sucesso.
        </p>

        <div class="loader">
            Redirecionando para o aplicativo...
        </div>
    </div>

</body>
</html>
