<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento EfetuadoB</title>

<script>
    function redirecionar() {

        const params = new URLSearchParams(window.location.search);

        // Debug
        console.log(window.location.href);

        const payload = {
            status: "handle",
            handle: "sua_infinite_tag",

            order_nsu:
                params.get("order_nsu") || "",

            transaction_nsu:
                params.get("transaction_nsu") ||
                params.get("transaction_id") ||
                "",

            slug:
                params.get("slug") || "",

            receipt_url:
                params.get("receipt_url") || "",

            capture_method:
                params.get("capture_method") || ""
        };

        console.log("PAYLOAD:", payload);

        const deepLink =
            "appsocio://retorno/tap_resulte?data=" +
            encodeURIComponent(JSON.stringify(payload));

        console.log("DEEP LINK:", deepLink);

        // REDIRECT
        window.location.href = deepLink;
    }

    setTimeout(redirecionar, 3000);
</script>
</head>

<body>

    <h1>Pagamento Efetuado com Sucesso</h1>

    <p>
        Você será redirecionado automaticamente...
    </p>

</body>
</html>
