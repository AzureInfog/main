<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento Efetuado</title>

<script>

    async function enviarParaAPI(payload) {

        try {

            const response = await fetch(
                "https://api.infog.com.br/app/assoc/site",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                }
            );

            const retorno = await response.text();

            console.log("POST OK:", retorno);

        } catch (erro) {

            console.error("Erro no POST:", erro);

        }
    }

    async function redirecionar() {

        const params = new URLSearchParams(window.location.search);

        const payload = {
            status: "handle",
            handle: "sua_infinite_tag",

            order_nsu:
                params.get("order_nsu") || "",

            transaction_nsu:
                params.get("transaction_nsu") ||
                params.get("transaction_id") ||
                "",

            slug:
                params.get("slug") || "",

            receipt_url:
                params.get("receipt_url") || "",

            capture_method:
                params.get("capture_method") || ""
        };

        console.log("PAYLOAD:", payload);

        // ENVIA POST PARA API
        await enviarParaAPI(payload);

        // DEEP LINK
        const deepLink =
            "appsocio://retorno/tap_resulte?data=" +
            encodeURIComponent(JSON.stringify(payload));

        console.log("DEEP LINK:", deepLink);

        // REDIRECT APP
        window.location.href = deepLink;
    }

    setTimeout(redirecionar, 3000);

</script>
</head>

<body>

    <h1>AAA - Pagamento Efetuado com Sucesso</h1>

    <p>
        Você será redirecionado automaticamente...
    </p>

</body>
</html>
